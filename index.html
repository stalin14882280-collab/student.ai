<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Student AI — Автономный (WebLLM)</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 20px auto; padding: 20px; }
        #chat { height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 10px; background: #f9f9f9; }
        #input { width: 80%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #1e3c72; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { margin: 10px 0; color: #666; }
    </style>
</head>
<body>
    <h2>🎓 Student AI (нейросеть в браузере)</h2>
    <div id="status">⏳ Загрузка модели... (это займёт ~1-2 минуты, только при первом запуске)</div>
    <div id="chat"></div>
    <input id="input" placeholder="Напиши задачу..." onkeypress="if(event.key==='Enter') sendMessage()" disabled>
    <button onclick="sendMessage()" id="sendBtn" disabled>Отправить</button>

    <script type="module">
        import { CreateWebWorkerMLCEngine, hasModelInCache } from "https://esm.run/@mlc-ai/web-llm";

        const chatDiv = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');

        // Модель DeepSeek-R1 (сжатая для браузера, ~1.5 ГБ)
        const MODEL = "deepseek-r1-qwen-1.5b-q4f16_1-MLC";
        
        let engine = null;

        async function init() {
            try {
                // Проверяем, есть ли модель в кэше
                const inCache = await hasModelInCache(MODEL);
                if (!inCache) {
                    statusDiv.textContent = "📦 Скачивание модели (~1.5 ГБ). Это только один раз...";
                }

                engine = await CreateWebWorkerMLCEngine(
                    new Worker(new URL("https://esm.run/@mlc-ai/web-llm/lib/worker.js"), { type: "module" }),
                    MODEL,
                    { 
                        initProgressCallback: (progress) => {
                            if (progress.progress === 1) {
                                statusDiv.textContent = "✅ Модель загружена! Можно задавать вопросы.";
                                input.disabled = false;
                                sendBtn.disabled = false;
                            } else {
                                statusDiv.textContent = `⏳ Загрузка: ${Math.round(progress.progress * 100)}%`;
                            }
                        }
                    }
                );
            } catch (e) {
                statusDiv.textContent = "❌ Ошибка загрузки модели. Попробуй обновить страницу.";
                console.error(e);
            }
        }

        window.sendMessage = async function() {
            const question = input.value.trim();
            if (!question || !engine) return;

            addMessage('👤 ' + question);
            input.value = '';
            sendBtn.disabled = true;
            input.disabled = true;

            try {
                const systemPrompt = "Ты Student AI — помощник по всем школьным предметам. Отвечай кратко, по делу, с объяснениями.";
                const fullPrompt = `${systemPrompt}\n\nВопрос: ${question}`;
                
                const reply = await engine.chat.completions.create({
                    messages: [{ role: "user", content: fullPrompt }],
                    temperature: 0.7,
                    max_tokens: 2048,
                });

                const answer = reply.choices[0].message.content;
                addMessage('🎓 ' + answer);
            } catch (e) {
                addMessage('❌ Ошибка: ' + e.message);
            } finally {
                sendBtn.disabled = false;
                input.disabled = false;
                input.focus();
            }
        };

        function addMessage(text) {
            chatDiv.innerHTML += `<p style="margin: 10px 0;">${text.replace(/\n/g, '<br>')}</p>`;
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        // Запускаем инициализацию
        init();

        // Глобальная функция для Enter
        window.sendMessage = sendMessage;
    </script>
</body>
</html>
